<svg width="600" height="30" viewBox="0 0 600 30" xmlns="http://www.w3.org/2000/svg">
  <style>
    .line {
      font-family: 'Courier New', Consolas, monospace;
      font-size: 16px;
      font-weight: 700;
      fill: #0E75B6;
    }
  </style>

  <!-- 2 lines, 3s hold + 0.4s crossfade each = ~7s loop, repeats forever -->

  <text x="10" y="21" class="line" opacity="0">
    📍 Bhubaneswar, India
    <animate attributeName="opacity"
      values="0;1;1;0;0;0"
      keyTimes="0;0.06;0.43;0.49;1;1"
      dur="7s" repeatCount="indefinite"/>
  </text>

  <text x="10" y="21" class="line" opacity="0">
    💡 Open to Collaborations &amp; Opportunities!
    <animate attributeName="opacity"
      values="0;0;0;1;1;0"
      keyTimes="0;0.49;0.55;0.63;0.94;1"
      dur="7s" repeatCount="indefinite"/>
  </text>

  <!-- Blinking cursor -->
  <rect x="420" y="5" width="9" height="18" fill="#0E75B6">
    <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.4;0.5;0.9;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
